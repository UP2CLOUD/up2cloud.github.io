name: CI/CD - Test and Deploy UP2CLOUD Website

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORM_ENDPOINT: https://formsubmit.co/ajax/cesarnogueira1210@gmail.com
  # Analytics / Search Console / Ads — placeholders are a harmless no-op
  # (dead script URL / bogus meta tag) until replaced with real IDs.
  GA_MEASUREMENT_ID: G-JVQKLM1R3Q # https://analytics.google.com → Admin → Data Streams → Measurement ID (G-XXXXXXXXXX)
  GOOGLE_ADS_ID: GOOGLE_ADS_ID # https://ads.google.com → Tools → Conversions → Conversion ID (AW-XXXXXXXXX). Optional — only if running Ads.
  GOOGLE_SITE_VERIFICATION_ID: GOOGLE_SITE_VERIFICATION_ID # https://search.google.com/search-console → Settings → Ownership verification → HTML tag → content value

jobs:
  test:
    name: Test static website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Validate required static assets
        run: |
          test -f index.html
          test -f .nojekyll
          grep -q "UP2CLOUD" index.html
          echo "Static asset checks passed."

      - name: Run HTML and link-quality tests
        run: npm test

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir:
          - terraform/github-pages
          - terraform/cloudflare
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.8.5

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  # Manual approval gate — runs on every PR and on pushes to main.
  # Requires a GitHub environment named "production-approval" with at least
  # one required reviewer configured under:
  #   Settings → Environments → production-approval → Required reviewers
  approve:
    name: Awaiting approval
    needs:
      - test
      - terraform-validate
    runs-on: ubuntu-latest
    environment:
      name: production-approval
    steps:
      - name: Approval received
        run: echo "Deployment approved by ${{ github.actor }} ✓"

  build:
    name: Build deploy artifact
    needs:
      - approve
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: ./node_modules/.bin/tailwindcss -i src/input.css -o assets/css/tailwind.min.css --minify

      - name: Prepare GitHub Pages artifact
        run: |
          rm -rf public
          mkdir -p public
          cp index.html public/index.html
          cp 404.html   public/404.html
          cp .nojekyll  public/.nojekyll
          # SEO & security files
          cp robots.txt  public/robots.txt  2>/dev/null || true
          cp sitemap.xml public/sitemap.xml 2>/dev/null || true
          cp _headers    public/_headers    2>/dev/null || true
          cp _redirects  public/_redirects  2>/dev/null || true
          # Custom domain — must be present so GitHub Pages keeps up2cloud.tech on every deploy
          cp CNAME       public/CNAME
          # Copy subpages and assets
          cp -r about   public/about   2>/dev/null || true
          cp -r privacy public/privacy 2>/dev/null || true
          cp -r blog    public/blog    2>/dev/null || true
          cp -r assets  public/assets  2>/dev/null || true

      - name: Resolve HTML includes (_includes/*.html)
        run: node scripts/resolve-includes.js public

      - name: Apply runtime production patches
        run: |
          # Runtime production patch: make the static contact form use FormSubmit.
          sed -i "s#https://formspree.io/f/REPLACE_WITH_YOUR_ID#${FORM_ENDPOINT}#g" public/index.html

          # Runtime production patch: Google Analytics / Ads / Search Console IDs.
          sed -i "s#GA_MEASUREMENT_ID#${GA_MEASUREMENT_ID}#g" public/index.html
          sed -i "s#GOOGLE_ADS_ID#${GOOGLE_ADS_ID}#g" public/index.html
          sed -i "s#GOOGLE_SITE_VERIFICATION_ID#${GOOGLE_SITE_VERIFICATION_ID}#g" public/index.html

          # Add FormSubmit hidden fields into the deployed artifact if not already present.
          if ! grep -q 'name="_subject" value="New UP2CLOUD Lead"' public/index.html; then
            python3 - <<'PY'
          from pathlib import Path
          path = Path('public/index.html')
          html = path.read_text()
          marker = '<form id="contact-form" class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100" novalidate aria-label="Contact form">'
          replacement = marker + '\n        <input type="hidden" name="_captcha" value="false">\n        <input type="hidden" name="_subject" value="New UP2CLOUD Lead">\n        <input type="hidden" name="_template" value="table">'
          html = html.replace(marker, replacement)
          path.write_text(html)
          PY
          fi

          grep -q "${FORM_ENDPOINT}" public/index.html

      - name: Inject cache-busting version into asset URLs
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          # Anchors on the ="..." attribute quote and tolerates relative
          # (assets/..., ../assets/...) as well as absolute (/assets/...)
          # references — the site's own stylesheet link is the relative
          # "assets/css/tailwind.min.css", which the previous
          # leading-slash-only pattern silently missed, leaving the most
          # layout-critical asset un-versioned.
          find public -name "*.html" | while read f; do
            sed -i "s|\(=[\"']\)\(\(\.\./\)*/\{0,1\}assets/[^\"'?]*\)\([\"']\)|\1\2?v=${GIT_SHA}\4|g" "$f"
          done
          echo "Cache-busting version: ${GIT_SHA}"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: https://up2cloud.tech
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
